automotive_finance: >
  Revenue-focused Automotive Finance & F&I Leader with 20+ years of dealership experience spanning finance management, special finance, credit rebuild, lender relations, menu selling, product penetration, and compliance. Proven top performer across Western Canada with a track record of increasing PVR, back-end gross, warranty penetration, and customer satisfaction across prime and non-prime credit tiers.

sales_leadership: >
  Automotive Sales & Operations Leader with 20+ years driving revenue growth, team performance, internet sales, lead management, and dealership profitability. Proven record of coaching sales and finance teams, improving closing ratios, managing inventory strategy, and aligning front-end and back-end gross performance.

business_development: >
  Business Development and Revenue Growth Leader with deep automotive, finance, CRM, and digital marketing experience. Skilled at building pipelines, developing strategic partnerships, improving lead conversion, and closing high-value opportunities in competitive, performance-driven environments.

automotive_saas: >
  Automotive SaaS and Dealership Technology Sales Leader combining 20+ years of dealership operations and finance experience with formal software development training. Expert at translating dealership pain points into technology solutions across CRM, digital retailing, automation, lead generation, F&I workflows, and inventory systems.

remote_sales: >
  Remote Sales and Business Development Professional with proven full-cycle sales experience, high-ticket closing ability, CRM discipline, and deep automotive finance expertise. Skilled at qualifying leads, presenting value, negotiating terms, and closing revenue opportunities in metrics-driven remote environments.
